<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>READY — Preparedness Gear Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f0e;
  --surface: #161a18;
  --surface2: #1e2421;
  --border: #2a3030;
  --accent: #c8f060;
  --accent2: #ff6b35;
  --warn: #ffb347;
  --danger: #ff4444;
  --text: #e8ede8;
  --muted: #7a8c82;
  --good: #4ecb71;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 4px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 4px;
}

.header-actions { display: none; }

/* ── SCENARIO STRIP (mobile) ────────────────────────────────── */
.scenario-strip {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
  position: sticky;
  top: 56px;
  z-index: 90;
  -webkit-overflow-scrolling: touch;
}
.scenario-strip::-webkit-scrollbar { display: none; }

.scenario-pill {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.scenario-pill.active {
  background: var(--accent);
  color: #0d0f0e;
  border-color: var(--accent);
  font-weight: 600;
}

/* ── DESKTOP APP GRID (off by default) ──────────────────────── */
.app { display: none; }

/* ── SIDEBAR ────────────────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  overflow-y: auto;
}
.sidebar-section { margin-bottom: 24px; }
.sidebar-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  padding: 0 20px 8px;
  text-transform: uppercase;
}
.scenario-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}
.scenario-btn:hover { background: var(--surface2); }
.scenario-btn.active { background: var(--surface2); border-left-color: var(--accent); color: var(--accent); }
.scenario-icon { font-size: 18px; flex-shrink: 0; }
.scenario-meta { display: flex; flex-direction: column; gap: 2px; }
.scenario-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
.bag-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 8px 20px; background: none; border: none;
  color: var(--muted); cursor: pointer; text-align: left;
  font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; transition: color 0.15s;
}
.bag-btn:hover { color: var(--text); }
.add-bag-btn {
  display: flex; align-items: center; gap: 6px;
  width: calc(100% - 40px); margin: 8px 20px; padding: 8px 12px;
  background: var(--surface2); border: 1px dashed var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer; font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 1px; transition: all 0.15s;
}
.add-bag-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── MAIN (desktop) ─────────────────────────────────────────── */
main { padding: 28px; overflow-y: auto; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 20px; }
.page-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 3px; color: var(--text); line-height: 1; }
.page-subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn {
  padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer;
  font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 600;
  letter-spacing: 0.5px; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #0d0f0e; }
.btn-primary:hover { background: #b8e050; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* ── STATS ROW (desktop) ────────────────────────────────────── */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;
}
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; line-height: 1; margin-bottom: 2px; }
.stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

/* ── FILTER BAR ─────────────────────────────────────────────── */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-chip {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent); color: #0d0f0e; border-color: var(--accent); font-weight: 600; }
.search-box {
  margin-left: auto; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; width: 200px; outline: none; transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }

/* ── ITEM TABLE (desktop) ───────────────────────────────────── */
.item-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.table-head {
  display: grid; grid-template-columns: 28px 1fr 90px 80px 80px 90px 90px 60px;
  padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
}
.th { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }
.item-row {
  display: grid; grid-template-columns: 28px 1fr 90px 80px 80px 90px 90px 60px;
  padding: 11px 16px; border-bottom: 1px solid var(--border); align-items: center;
  transition: background 0.1s; cursor: pointer;
}
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--surface2); }
.item-check {
  width: 16px; height: 16px; border-radius: 3px; border: 2px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.item-check.checked { background: var(--accent); border-color: var(--accent); color: #0d0f0e; font-size: 10px; }
.item-name { font-weight: 500; font-size: 13px; }
.item-desc { color: var(--muted); font-size: 11px; margin-top: 2px; }

.category-pill {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500;
}
.td { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

.status-badge { padding: 3px 8px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; }
.status-ok { background: rgba(78,203,113,0.15); color: var(--good); }
.status-warn { background: rgba(255,179,71,0.15); color: var(--warn); }
.status-expired { background: rgba(255,68,68,0.15); color: var(--danger); }
.status-missing { background: rgba(122,140,130,0.12); color: var(--muted); }

.progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

/* ── CATEGORY COLORS ────────────────────────────────────────── */
.cat-water   { background: rgba(100,180,255,0.15); color: #64b4ff; }
.cat-food    { background: rgba(255,179,71,0.15);  color: var(--warn); }
.cat-shelter { background: rgba(78,203,113,0.15);  color: var(--good); }
.cat-medical { background: rgba(255,100,100,0.15); color: #ff6464; }
.cat-comms   { background: rgba(200,240,96,0.15);  color: var(--accent); }
.cat-tools   { background: rgba(180,140,255,0.15); color: #b48cff; }
.cat-docs    { background: rgba(255,107,53,0.15);  color: var(--accent2); }
.cat-power   { background: rgba(255,220,100,0.15); color: #ffdc64; }
.cat-hygiene { background: rgba(150,220,200,0.15); color: #96dcc8; }
.cat-nav     { background: rgba(200,160,100,0.15); color: #c8a064; }

/* ── MODAL ──────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
}
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; margin-bottom: 20px; color: var(--accent); }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.form-input, .form-select {
  width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px; outline: none; transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select option { background: var(--surface2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* ── SECTION GROUP (desktop) ────────────────────────────────── */
.section-group { margin-bottom: 32px; }
.section-group-title { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.section-group-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; }
.section-progress { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

.alert-banner {
  background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.3);
  border-radius: 6px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.alert-icon { font-size: 18px; }
.alert-text { font-size: 12px; color: var(--warn); }
.alert-text strong { display: block; margin-bottom: 2px; font-size: 13px; }

.vol-bar { width: 48px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.vol-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; opacity: 0.7; }
.row-actions { display: flex; gap: 6px; justify-content: flex-end; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; font-size: 14px; transition: color 0.15s; border-radius: 3px; }
.icon-btn:hover { color: var(--text); background: var(--surface2); }
.source-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); opacity: 0.7; margin-top: 2px; }
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }

/* ── MOBILE CONTENT ─────────────────────────────────────────── */
.mobile-content {
  padding: 14px 16px;
  padding-bottom: 90px;
}

.mobile-stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.mobile-stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
}
.mobile-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; line-height: 1; margin-bottom: 2px; }
.mobile-stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

.mobile-section { margin-bottom: 20px; }
.mobile-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
}
.mobile-section-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; }
.mobile-section-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }

.mobile-item-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px; margin-bottom: 8px; cursor: pointer; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.mobile-item-card:active { background: var(--surface2); }

.mic-top { display: flex; align-items: flex-start; gap: 10px; }
.mic-check {
  width: 22px; height: 22px; border-radius: 4px; border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; margin-top: 1px; font-size: 13px;
}
.mic-check.checked { background: var(--accent); border-color: var(--accent); color: #0d0f0e; }
.mic-body { flex: 1; min-width: 0; }
.mic-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
.mic-name.strikethrough { text-decoration: line-through; opacity: 0.7; }
.mic-desc { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.3; }
.mic-badges { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }

/* ── FAB ────────────────────────────────────────────────────── */
.fab {
  position: fixed; bottom: 76px; right: 20px; width: 56px; height: 56px;
  border-radius: 50%; background: var(--accent); color: #0d0f0e; border: none;
  font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(200,240,96,0.4); z-index: 110;
  transition: transform 0.15s; line-height: 1; -webkit-tap-highlight-color: transparent;
}
.fab:active { transform: scale(0.92); }

/* ── BOTTOM NAV ─────────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: stretch; z-index: 120;
}
.bnav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; border: none; background: none; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.5px;
  text-transform: uppercase; cursor: pointer; position: relative;
  -webkit-tap-highlight-color: transparent; transition: color 0.15s;
}
.bnav-tab.active { color: var(--accent); }
.bnav-icon { font-size: 20px; line-height: 1; }
.bnav-badge {
  position: absolute; top: 8px; left: calc(50% + 4px);
  background: var(--danger); color: #fff; font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px; padding: 0 3px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Sans', sans-serif;
}

/* ── DRAWERS ────────────────────────────────────────────────── */
.drawer-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 130;
}
.drawer-overlay.open { display: block; }

.drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0; transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 140; max-height: 78vh; overflow-y: auto; padding-bottom: 24px;
}
.drawer.open { transform: translateY(0); }
.drawer-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.drawer-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); padding: 14px 20px 12px; border-bottom: 1px solid var(--border); }
.drawer-body { padding: 16px 20px; }

.mobile-bag-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; margin-bottom: 10px;
}
.mobile-bag-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.mobile-bag-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); line-height: 1.6; }

.mobile-alert-row {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.mobile-alert-row:last-child { border-bottom: none; }

.drawer-view-btn {
  display: flex; align-items: center; gap: 12px; width: 100%; padding: 13px 0;
  background: none; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px; text-align: left; -webkit-tap-highlight-color: transparent;
}
.drawer-view-btn:last-child { border-bottom: none; }
.dv-icon { font-size: 20px; width: 28px; flex-shrink: 0; }
.dv-count { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

/* ── RECOMMENDATION PANEL ───────────────────────────────────── */
.reco-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  z-index: 250; align-items: flex-end; backdrop-filter: blur(2px);
}
.reco-overlay.open { display: flex; }
.reco-panel {
  background: var(--surface); border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0; width: 100%; max-height: 84vh;
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
}
.reco-overlay.open .reco-panel { transform: translateY(0); }
.reco-handle-bar { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.reco-header { padding: 10px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.reco-header-row { display: flex; align-items: flex-start; justify-content: space-between; }
.reco-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
.reco-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
.reco-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.reco-status { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 10px; min-height: 18px; }
.reco-text { font-size: 13px; line-height: 1.75; color: var(--text); white-space: pre-wrap; word-wrap: break-word; }
.reco-footer { padding: 10px 16px 16px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 8px; align-items: center; }
.reco-key-input {
  flex: 1; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; outline: none; transition: border-color 0.15s;
}
.reco-key-input:focus { border-color: var(--accent); }
.reco-key-input::placeholder { color: var(--muted); }
@keyframes reco-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
.reco-cursor { display: inline-block; color: var(--accent); animation: reco-blink 1s step-end infinite; }
@keyframes reco-dot { 0%,80%,100%{opacity:.25} 40%{opacity:1} }
.reco-dots { display: inline-flex; gap: 4px; align-items: center; vertical-align: middle; }
.reco-dots i { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: reco-dot 1.2s ease-in-out infinite; font-style: normal; }

  .reco-overlay.open .reco-panel { transform: none; }
  .reco-handle-bar { display: none; }
}

let nextId = 164;

function nextDate(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

// ── LOCALSTORAGE ──────────────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem('ready_items', JSON.stringify(items));
    localStorage.setItem('ready_bags', JSON.stringify(bags));
    localStorage.setItem('ready_nextId', String(nextId));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const si = localStorage.getItem('ready_items');
    const sb = localStorage.getItem('ready_bags');
    const sn = localStorage.getItem('ready_nextId');
    if (si !== null) items = JSON.parse(si);
    if (sb !== null) bags = JSON.parse(sb);
    if (sn !== null) nextId = parseInt(sn);
  } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────
function daysUntilExpiry(dateStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
}

function expiryStatus(dateStr) {
  const d = daysUntilExpiry(dateStr);
  if (d === null) return null;
  if (d < 0) return 'expired';
  if (d <= 90) return 'warn';
  return 'ok';
}

function scenarioItems(scenario) {
  return items.filter(i => i.scenario === scenario);
}

function totalVolume(list) {
  return list.reduce((s, i) => s + (parseFloat(i.volume) || 0), 0);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── SCENARIO / VIEW ───────────────────────────────────────────
function setScenario(s) {
  currentScenario = s;
  currentFilter = 'all';
  document.querySelectorAll('[data-scenario]').forEach(el => {
    el.classList.toggle('active', el.dataset.scenario === s);
  });
  render();
}

function setView(v) {
  currentView = v;
  currentFilter = 'all';
  render();
}

function setFilter(f) {
  currentFilter = f;
  render();
}

// ── MOBILE NAV / DRAWERS ──────────────────────────────────────
function setMobileTab(tab) {
  if (tab === 'items') {
    closeAllDrawers();
    return;
  }
  document.querySelectorAll('.bnav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('bnav-' + tab).classList.add('active');
  openDrawer(tab + '-drawer');
}

function openDrawer(id) {
  closeAllDrawers(true);
  document.getElementById(id).classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeAllDrawers(skipTabReset) {
  document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
  document.getElementById('drawer-overlay').classList.remove('open');
  if (!skipTabReset) {
    document.querySelectorAll('.bnav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('bnav-items').classList.add('active');
  }
}

// ── SAVE ──────────────────────────────────────────────────────
function saveBag() {
  const name = document.getElementById('bag-name').value.trim();
  const liters = parseFloat(document.getElementById('bag-liters').value) || 0;
  const litersExpanded = parseFloat(document.getElementById('bag-liters-expanded').value) || null;
  const scenario = document.getElementById('bag-scenario').value;
  const dims = document.getElementById('bag-dims').value.trim();
  const notes = document.getElementById('bag-notes').value.trim();
  if (!name) { alert('Enter a bag name.'); return; }
  bags.push({ id: Date.now(), name, liters, litersExpanded, scenario, dims, notes });
  ['bag-name','bag-liters','bag-liters-expanded','bag-dims','bag-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  closeModal('bag-modal');
  render();
}

function saveItem() {
  const name = document.getElementById('item-name').value.trim();
  if (!name) { alert('Enter item name.'); return; }
  items.push({
    id: nextId++,
    name,
    desc: document.getElementById('item-desc').value.trim(),
    category: document.getElementById('item-category').value,
    priority: document.getElementById('item-priority').value,
    scenario: document.getElementById('item-scenario').value,
    volume: parseFloat(document.getElementById('item-volume').value) || 0,
    weight: document.getElementById('item-weight').value.trim(),
    expiry: document.getElementById('item-expiry').value || null,
    source: document.getElementById('item-source').value,
    checked: false,
  });
  document.getElementById('item-name').value = '';
  document.getElementById('item-desc').value = '';
  closeModal('item-modal');
  render();
}

function toggleCheck(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.checked = !item.checked; render(); }
}

function deleteItem(id) {
  if (!confirm('Remove this item?')) return;
  items = items.filter(i => i.id !== id);
  render();
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  updateSidebarCounts();
  renderBagList();
  renderMain();
  renderMobileContent();
  renderBagsDrawer();
  renderAlertsDrawer();
  updateAlertBadge();
  updateMoreCounts();
  saveToStorage();
}

function updateSidebarCounts() {
  Object.keys(SCENARIO_LABELS).forEach(s => {
    const el = document.getElementById('count-' + s);
    if (el) {
      const list = scenarioItems(s);
      el.textContent = list.filter(i => i.checked).length + '/' + list.length + ' packed';
    }
  });
}

function renderBagList() {
  const el = document.getElementById('bag-list');
  if (!bags.length) { el.innerHTML = ''; return; }
  el.innerHTML = bags.map(b => `
    <div style="display:flex;align-items:center;padding:8px 20px;gap:8px">
      <span style="flex:1;font-size:12px;color:var(--text)">${b.name}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">${b.liters}${b.litersExpanded ? '–' + b.litersExpanded : ''}L</span>
    </div>
  `).join('');
}

function getFilteredItems() {
  let list;
  if (currentView === 'expiring') {
    list = items.filter(i => expiryStatus(i.expiry) === 'warn');
  } else if (currentView === 'expired') {
    list = items.filter(i => expiryStatus(i.expiry) === 'expired');
  } else if (currentView === 'missing') {
    list = items.filter(i => i.scenario === currentScenario && !i.checked);
  } else {
    list = items.filter(i => i.scenario === currentScenario);
  }
  if (currentFilter !== 'all') list = list.filter(i => i.category === currentFilter);
  if (searchQuery) list = list.filter(i =>
    i.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
    (i.desc || '').toLowerCase().includes(searchQuery.toLowerCase())
  );
  return list;
}

function renderItemRow(item) {
  const es = expiryStatus(item.expiry);
  const d = daysUntilExpiry(item.expiry);
  let expiryLabel = '—', statusClass = '';
  if (item.expiry) {
    if (es === 'expired')   { expiryLabel = 'Exp ' + (d < -365 ? '>1yr ago' : Math.abs(d) + 'd ago'); statusClass = 'status-expired'; }
    else if (es === 'warn') { expiryLabel = d + 'd'; statusClass = 'status-warn'; }
    else { expiryLabel = new Date(item.expiry).toLocaleDateString('en-US',{month:'short',year:'numeric'}); statusClass = 'status-ok'; }
  }
  const pcolor = PRIORITY_COLORS[item.priority] || 'var(--muted)';
  const volFill = Math.min(100, (item.volume / 5) * 100);
  return `

// ── MOBILE RENDER ─────────────────────────────────────────────
function renderMobileContent() {

        <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div></div>
      </div>
      <div class="mobile-stat-card">
        <div class="mobile-stat-val">${packed}/${total}</div>
        <div class="mobile-stat-label">Checked</div>
      </div>
      <div class="mobile-stat-card">
        <div class="mobile-stat-val" style="color:${bagCapacity && totalVol > bagCapacity ? 'var(--danger)' : 'var(--text)'}">

        </div>
        <div class="mobile-stat-label">${bagCapacity ? 'of ' + bagCapacity + 'L' : 'Total Vol'}</div>
        ${bagCapacity ? `<div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${Math.min(100,Math.round(totalVol/bagCapacity*100))}%;background:${totalVol>bagCapacity?'var(--danger)':'var(--good)'}"></div></div>` : ''}
      </div>

        <div class="mobile-stat-val" style="color:${expired?'var(--danger)':expiringSoon?'var(--warn)':'var(--good)'}">${expired + expiringSoon}</div>

function lookupBag() {
  const url = document.getElementById('import-url').value.trim();
  if (!url) { document.getElementById('import-status').innerHTML = '<span style="color:var(--danger)">Enter a product URL.</span>'; return; }

  const savedKey = localStorage.getItem('ready_apikey');
  const inputKey = document.getElementById('import-apikey-input')?.value.trim();
  const key = savedKey || inputKey;

  if (!key) {
    document.getElementById('import-key-row').style.display = 'block';
    document.getElementById('import-status').innerHTML = '<span style="color:var(--muted)">Enter your API key above.</span>';
    return;
  }
  if (inputKey && !savedKey) {
    localStorage.setItem('ready_apikey', inputKey);
    updateRecoFooter();
  }

  const btn = document.getElementById('import-lookup-btn');
  const status = document.getElementById('import-status');
  btn.disabled = true;
  btn.textContent = 'Looking up...';
  status.innerHTML = '<span style="color:var(--accent)"><span class="reco-dots"><i></i><i></i><i></i></span> Searching for bag specs...</span>';

  callClaudeForBagSpecs(url, key)
    .then(specs => showImportPreview(specs))
    .catch(err => {
      status.innerHTML = '<span style="color:var(--danger)">⚠ ' + escHtml(err.message) + '</span>';
      btn.disabled = false;
      btn.textContent = 'Try Again';
    });
}

async function callClaudeForBagSpecs(productUrl, apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-beta': 'web-search-2026-02-09',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      thinking: { type: 'adaptive' },
      tools: [{ type: 'web_search_20260209', name: 'web_search' }],
      system: `You are a preparedness gear expert. Search for the bag at the given URL and extract its specs. Return ONLY a single valid JSON object — no markdown, no explanation, nothing else.

Available scenarios and when to use them:
- "72hr": 40–65L evacuation pack, 72-hour kit
- "ghb": 20–40L get-home bag, urban carry
- "sip": not typically a bag
- "vehicle": hard cases, duffels stored in cars
- "wildfire": fast grab-and-go bags, 30–50L
- "earthquake": rescue/CERT gear bags
- "edc": <10L, everyday carry, sling bags, hip packs
- "inch": >60L, rolling luggage, large expedition packs
- "wush": 10–20L, rapid-grab document/comms bags

JSON schema:
{
  "name": "Full product name with brand",
  "liters": 40,
  "litersExpanded": null,
  "dims": "21\\"H × 12\\"W × 8\\"D",
  "notes": "Key features in 1–2 sentences",
  "suggestedScenario": "ghb",
  "scenarioReason": "One sentence explaining why this scenario fits"
}`,
      messages: [{ role: 'user', content: 'Extract bag specs and return JSON for: ' + productUrl }]
    })
  });

  if (!res.ok) {
    let msg = 'API error ' + res.status;
    try { const e = await res.json(); msg = e.error?.message || msg; } catch {}
    if (res.status === 401) { localStorage.removeItem('ready_apikey'); updateRecoFooter(); }
    throw new Error(msg);
  }

  const data = await res.json();
  const textBlock = data.content.find(b => b.type === 'text');
  if (!textBlock) throw new Error('No response received from Claude.');

  const jsonMatch = textBlock.text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Could not parse bag specs. Try a different URL.');

  let specs;
  try { specs = JSON.parse(jsonMatch[0]); } catch { throw new Error('Invalid JSON in response. Try again.'); }
  if (!specs.name) throw new Error('Could not extract bag name. Try a manufacturer or retailer URL.');
  return specs;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,2} (.+)$/gm,'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:17px;letter-spacing:1px;color:var(--accent);margin:18px 0 4px;display:block">$1</div>')
    .replace(/^### (.+)$/gm,'<div style="font-weight:600;font-size:13px;color:var(--text);margin:12px 0 3px">$1</div>')
    .replace(/^[-*•] (.+)$/gm,'<div style="padding-left:14px;margin:3px 0;color:var(--muted)"><span style="color:var(--accent);margin-right:6px">▸</span>$1</div>')
    .replace(/---+/g,'<hr style="border:none;border-top:1px solid var(--border);margin:14px 0">')
    .replace(/\n/g,'<br>');
}

async function getRecommendations(item, apiKey) {
  const statusEl = document.getElementById('reco-status');
  const textEl = document.getElementById('reco-text');
  const bodyEl = document.getElementById('reco-body');

  statusEl.innerHTML = '<span class="reco-dots"><i></i><i></i><i></i></span> <span style="color:var(--muted)">Connecting...</span>';
  textEl.innerHTML = '';

  const prompt = `I'm building a ${SCENARIO_LABELS[item.scenario] || item.scenario} preparedness kit. I need specific product recommendations for: **${item.name}**
${item.desc ? '\nItem context: ' + item.desc : ''}
Category: ${item.category} | Priority: ${item.priority}

Please search for and recommend exactly 2–3 specific products available for purchase right now. For each, include:
- Exact brand and model name
- Current price (with retailer)
- Key specs relevant to emergency preparedness
- Main advantage and one tradeoff vs alternatives

Be specific — actual product names with current pricing, not general categories.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-beta': 'web-search-2026-02-09',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        thinking: { type: 'adaptive' },
        tools: [{ type: 'web_search_20260209', name: 'web_search' }],
        stream: true,
        system: 'You are a preparedness gear expert. Search the web for current products, pricing, and reviews. Provide specific product recommendations with actual model names and current prices. Be direct and practical.',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      let msg = 'API error ' + res.status;
      try { const e = await res.json(); msg = e.error?.message || msg; } catch {}
      if (res.status === 401) {
        statusEl.textContent = '⚠ Invalid API key — check and re-enter below.';
        localStorage.removeItem('ready_apikey');
        updateRecoFooter();
      } else {
        statusEl.textContent = '⚠ ' + msg;
      }
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', fullText = '', blockType = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        try {
          const ev = JSON.parse(raw);
          if (ev.type === 'content_block_start') {
            blockType = ev.content_block?.type;
            if (blockType === 'tool_use') {
              statusEl.innerHTML = '<span style="color:var(--accent)">🔍 Searching the web...</span>';
            } else if (blockType === 'text') {
              statusEl.innerHTML = '<span class="reco-dots"><i></i><i></i><i></i></span> <span style="color:var(--muted)">Writing recommendations...</span>';
            }
          } else if (ev.type === 'content_block_delta' && blockType === 'text' && ev.delta?.type === 'text_delta') {
            fullText += ev.delta.text;
            textEl.innerHTML = escHtml(fullText) + '<span class="reco-cursor">▌</span>';
            bodyEl.scrollTop = bodyEl.scrollHeight;
          } else if (ev.type === 'content_block_stop' && blockType === 'text') {
            textEl.innerHTML = renderMarkdown(fullText);
            statusEl.textContent = '';
            blockType = null;
          } else if (ev.type === 'message_stop') {
            statusEl.textContent = '';
            if (fullText) textEl.innerHTML = renderMarkdown(fullText);
          }
        } catch {}
      }
    }

    if (!fullText) statusEl.textContent = 'No recommendations returned. Try again.';

  } catch (err) {
    statusEl.textContent = '⚠ ' + (err.message || 'Request failed');
  }
}

// ── INIT ──────────────────────────────────────────────────────
loadFromStorage();
render();
</script>
