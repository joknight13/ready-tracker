<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>READY — Preparedness Gear Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #161a18;
    --surface2: #1e2421;
    --border: #2a3030;
    --accent: #c8f060;
    --accent2: #ff6b35;
    --warn: #ffb347;
    --danger: #ff4444;
    --text: #e8ede8;
    --muted: #7a8c82;
    --good: #4ecb71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 24px;
  }

  .sidebar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 0 20px 8px;
    text-transform: uppercase;
  }

  .scenario-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }

  .scenario-btn:hover { background: var(--surface2); }
  .scenario-btn.active {
    background: var(--surface2);
    border-left-color: var(--accent);
    color: var(--accent);
  }

  .scenario-icon { font-size: 18px; flex-shrink: 0; }

  .scenario-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .scenario-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .bag-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 20px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    transition: color 0.15s;
  }

  .bag-btn:hover { color: var(--text); }

  .add-bag-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: calc(100% - 40px);
    margin: 8px 20px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .add-bag-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN */
  main {
    padding: 28px;
    overflow-y: auto;
  }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 20px;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  .page-subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* BAG PROFILE CARD */
  .bag-profile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }

  .bag-profile-info { display: flex; gap: 24px; align-items: center; }

  .bag-volume-gauge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 80px;
  }

  .gauge-ring {
    position: relative;
    width: 72px;
    height: 72px;
  }

  .gauge-ring svg { transform: rotate(-90deg); }

  .gauge-ring .track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 6;
  }

  .gauge-ring .fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }

  .gauge-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
  }

  .gauge-pct { font-size: 15px; font-weight: 600; }

  .bag-details { display: flex; flex-direction: column; gap: 4px; }
  .bag-name { font-size: 16px; font-weight: 600; }
  .bag-spec { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  .btn {
    padding: 8px 16px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0f0e;
  }
  .btn-primary:hover { background: #b8e050; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); color: #0d0f0e; border-color: var(--accent); font-weight: 600; }

  .search-box {
    margin-left: auto;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* ITEM TABLE */
  .item-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-head {
    display: grid;
    grid-template-columns: 28px 1fr 90px 80px 80px 90px 90px 60px;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
  }

  .item-row {
    display: grid;
    grid-template-columns: 28px 1fr 90px 80px 80px 90px 90px 60px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.1s;
    cursor: pointer;
  }

  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface2); }

  .item-check {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 2px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .item-check.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f0e;
    font-size: 10px;
  }

  .item-name { font-weight: 500; font-size: 13px; }
  .item-desc { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .category-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
  }

  .td { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .status-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
  }

  .status-ok { background: rgba(78,203,113,0.15); color: var(--good); }
  .status-warn { background: rgba(255,179,71,0.15); color: var(--warn); }
  .status-expired { background: rgba(255,68,68,0.15); color: var(--danger); }
  .status-missing { background: rgba(122,140,130,0.12); color: var(--muted); }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* CATEGORY COLORS */
  .cat-water { background: rgba(100,180,255,0.15); color: #64b4ff; }
  .cat-food { background: rgba(255,179,71,0.15); color: var(--warn); }
  .cat-shelter { background: rgba(78,203,113,0.15); color: var(--good); }
  .cat-medical { background: rgba(255,100,100,0.15); color: #ff6464; }
  .cat-comms { background: rgba(200,240,96,0.15); color: var(--accent); }
  .cat-tools { background: rgba(180,140,255,0.15); color: #b48cff; }
  .cat-docs { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .cat-power { background: rgba(255,220,100,0.15); color: #ffdc64; }
  .cat-hygiene { background: rgba(150,220,200,0.15); color: #96dcc8; }
  .cat-nav { background: rgba(200,160,100,0.15); color: #c8a064; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    color: var(--accent);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* SECTION GROUP */
  .section-group { margin-bottom: 32px; }

  .section-group-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-group-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
  }

  .section-progress {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* EXPIRY ALERT */
  .alert-banner {
    background: rgba(255,179,71,0.08);
    border: 1px solid rgba(255,179,71,0.3);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .alert-icon { font-size: 18px; }
  .alert-text { font-size: 12px; color: var(--warn); }
  .alert-text strong { display: block; margin-bottom: 2px; font-size: 13px; }

  /* VOLUME TAG */
  .vol-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    font-size: 14px;
    transition: color 0.15s;
    border-radius: 3px;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  /* TOOLTIP */
  .source-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    opacity: 0.7;
    margin-top: 2px;
  }

  /* VOLUME BAR INLINE */
  .vol-bar {
    width: 48px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .vol-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    opacity: 0.7;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }

  /* ── MOBILE BOTTOM NAV ── */
  .mobile-bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 150;
    padding: 0 4px;
  }

  .mobile-bottom-nav .nav-items {
    display: flex;
    height: 100%;
    align-items: stretch;
  }

  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    padding: 6px 2px;
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .mobile-nav-btn.active { color: var(--accent); }
  .mobile-nav-btn:active { background: var(--surface2); }
  .mobile-nav-icon { font-size: 20px; line-height: 1; }

  /* ── MOBILE DRAWER ── */
  .mobile-drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 180;
    backdrop-filter: blur(2px);
  }
  .mobile-drawer-overlay.open { display: block; }

  .mobile-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 85vh;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    z-index: 190;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }

  .mobile-drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 16px;
  }

  .drawer-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  /* ── MOBILE SCENARIO SCROLL ── */
  .mobile-scenario-scroll {
    display: none;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 10px 16px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .mobile-scenario-scroll::-webkit-scrollbar { display: none; }

  .mobile-scenario-chip {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .mobile-scenario-chip.active {
    background: rgba(200,240,96,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── MOBILE ITEM CARDS ── */
  .mobile-item-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s;
  }
  .mobile-item-card:active { border-color: var(--accent); }
  .mobile-item-card.checked { opacity: 0.5; }

  .mobile-card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .mobile-card-check {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 12px;
    transition: all 0.15s;
  }
  .mobile-card-check.checked { background: var(--accent); border-color: var(--accent); color: #0d0f0e; font-weight: 700; }

  .mobile-card-body { flex: 1; min-width: 0; }
  .mobile-card-name {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .mobile-card-name.checked { text-decoration: line-through; color: var(--muted); }
  .mobile-card-desc { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

  .mobile-card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .mobile-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 500;
  }

  .mobile-card-delete {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    padding: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    border-radius: 6px;
  }
  .mobile-card-delete:active { background: rgba(255,68,68,0.15); color: var(--danger); }

  /* ── MOBILE STATS ── */
  .mobile-stats {
    display: none;

let nextId = items.length + 1;

function nextDate(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function daysUntilExpiry(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / 86400000);
}

function expiryStatus(dateStr) {
  const d = daysUntilExpiry(dateStr);
  if (d === null) return null;
  if (d < 0) return 'expired';
  if (d <= 90) return 'warn';
  return 'ok';
}

function scenarioItems(scenario) {
  return items.filter(i => i.scenario === scenario);
}

function totalVolume(itemList) {
  return itemList.reduce((s, i) => s + (parseFloat(i.volume) || 0), 0);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ─── SCENARIO / VIEW ─────────────────────────────────────────────────────────
function setScenario(s) {
  currentScenario = s;
  currentFilter = 'all';
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  render();
}

function setView(v) {
  currentView = v;
  currentFilter = 'all';
  render();
}

function setFilter(f) {
  currentFilter = f;
  render();
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
function saveBag() {
  const name = document.getElementById('bag-name').value.trim();
  const liters = parseFloat(document.getElementById('bag-liters').value) || 0;
  const litersExpanded = parseFloat(document.getElementById('bag-liters-expanded').value) || null;
  const scenario = document.getElementById('bag-scenario').value;
  const dims = document.getElementById('bag-dims').value.trim();
  const notes = document.getElementById('bag-notes').value.trim();
  if (!name) { alert('Enter a bag name.'); return; }
  bags.push({ id: Date.now(), name, liters, litersExpanded, scenario, dims, notes });
  document.getElementById('bag-name').value = '';
  document.getElementById('bag-liters').value = '';
  document.getElementById('bag-liters-expanded').value = '';
  document.getElementById('bag-dims').value = '';
  document.getElementById('bag-notes').value = '';
  closeModal('bag-modal');
  render();
}

function openAddItem(scenario) {
  // Pre-select the current scenario in the form
  const s = scenario || currentScenario;
  const sel = document.getElementById('item-scenario');
  if (sel) sel.value = s;
  // Update subtitle label
  const lbl = document.getElementById('item-modal-scenario-label');
  if (lbl) lbl.textContent = SCENARIO_LABELS[s] || s;
  // Reset fields
  ['item-name','item-desc','item-volume','item-weight','item-link','item-maintenance'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('item-qty').value = '1';
  document.getElementById('item-expiry').value = '';
  document.getElementById('item-source').value = 'Custom';
  document.getElementById('item-checked').value = 'false';
  document.getElementById('item-priority').value = 'medium';
  openModal('item-modal');
}

function saveItem() {
  const name = document.getElementById('item-name').value.trim();
  if (!name) { document.getElementById('item-name').focus(); document.getElementById('item-name').style.borderColor='var(--danger)'; return; }
  document.getElementById('item-name').style.borderColor = '';
  const item = {
    id: nextId++,
    name,
    desc: document.getElementById('item-desc').value.trim(),
    category: document.getElementById('item-category').value,
    priority: document.getElementById('item-priority').value,
    scenario: document.getElementById('item-scenario').value,
    volume: parseFloat(document.getElementById('item-volume').value) || 0,
    weight: document.getElementById('item-weight').value.trim(),
    qty: parseInt(document.getElementById('item-qty').value) || 1,
    expiry: document.getElementById('item-expiry').value || null,
    source: document.getElementById('item-source').value,
    link: document.getElementById('item-link').value.trim(),
    maintenance: document.getElementById('item-maintenance').value.trim(),
    checked: document.getElementById('item-checked').value === 'true',
    custom: true,
  };
  items.push(item);
  closeModal('item-modal');
  render();
}

function toggleCheck(id) {
  const item = items.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  render();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  updateSidebarCounts();
  renderBagList();
  renderMain();
}

function updateSidebarCounts() {
  Object.keys(SCENARIO_LABELS).forEach(s => {
    const el = document.getElementById(`count-${s}`);
    if (el) {
      const list = scenarioItems(s);
      el.textContent = `${list.filter(i => i.checked).length}/${list.length} packed`;
    }
  });
}

function reassignBag(bagId, newScenario) {
  const bag = bags.find(b => b.id === bagId);
  if (bag) bag.scenario = newScenario;
  render();
}

function deleteBag(bagId) {
  bags = bags.filter(b => b.id !== bagId);
  render();
}

function renderBagList() {
  const el = document.getElementById('bag-list');
  if (!bags.length) { el.innerHTML = ''; return; }
  el.innerHTML = bags.map(b => {
    const volLabel = b.litersExpanded
      ? `${b.liters}L <span style="color:var(--accent);font-size:9px">▸ ${b.litersExpanded}L exp</span>`
      : `${b.liters}L`;
    const scenarioOptions = Object.entries(SCENARIO_LABELS).map(([k, v]) =>
      `<option value="${k}" ${b.scenario === k ? 'selected' : ''}>${v}</option>`
    ).join('');
    return `
      <div style="padding:8px 20px 10px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600;color:var(--text)">${b.name}</span>
          <button class="icon-btn" style="font-size:11px" title="Remove bag" onclick="deleteBag(${b.id})">✕</button>
        </div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:6px">${volLabel}</div>
        <select class="form-select" style="font-size:11px;padding:4px 8px;height:auto"
          onchange="reassignBag(${b.id}, this.value)">
          ${scenarioOptions}
        </select>
      </div>
    `;
  }).join('');
}

function getFilteredItems() {
  let list;
  if (currentView === 'expiring') {
    list = items.filter(i => { const s = expiryStatus(i.expiry); return s === 'warn'; });
  } else if (currentView === 'expired') {
    list = items.filter(i => expiryStatus(i.expiry) === 'expired');
  } else if (currentView === 'missing') {
    list = items.filter(i => i.scenario === currentScenario && !i.checked);
  } else {
    list = items.filter(i => i.scenario === currentScenario);
  }

  if (currentFilter !== 'all') list = list.filter(i => i.category === currentFilter);
  if (searchQuery) list = list.filter(i =>
    i.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
    (i.desc || '').toLowerCase().includes(searchQuery.toLowerCase())
  );
  return list;
}

              <div class="th"></div>
              <div class="th">Item</div>
              <div class="th">Category</div>
              <div class="th">Priority</div>
              <div class="th">Volume</div>
              <div class="th">Expiry</div>
              <div class="th">Source</div>
              <div class="th"></div>
            </div>
            ${catItems.map(item => renderItemRow(item)).join('')}
            <div style="padding:8px 16px;border-top:1px dashed var(--border)">
              <button onclick="openAddItemInCategory('${currentScenario}','${cat}')"
                style="background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.5px;padding:2px 0;transition:color 0.15s"
                onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
                ＋ Add custom ${CAT_LABELS[cat]?.replace(/^\S+\s/,'').toLowerCase()} item
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('')}
  `;
}

function openAddItemInCategory(scenario, category) {
  openAddItem(scenario);
  // After modal opens, set the category
  setTimeout(() => {
    const sel = document.getElementById('item-category');
    if (sel) sel.value = category;
  }, 10);
}

function renderItemRow(item) {
  const es = expiryStatus(item.expiry);
  const d = daysUntilExpiry(item.expiry);
  let expiryLabel = '—';
  let statusClass = '';
  if (item.expiry) {
    if (es === 'expired') { expiryLabel = `Exp ${d < -365 ? '>1yr ago' : Math.abs(d)+'d ago'}`; statusClass = 'status-expired'; }
    else if (es === 'warn') { expiryLabel = `${d}d`; statusClass = 'status-warn'; }
    else { const dt = new Date(item.expiry); expiryLabel = dt.toLocaleDateString('en-US',{month:'short',year:'numeric'}); statusClass = 'status-ok'; }
  }
  const pcolor = PRIORITY_COLORS[item.priority] || 'var(--muted)';
  const volMax = 5;
  const volFill = Math.min(100, (item.volume / volMax) * 100);

  return `
    <div class="item-row" style="${item.checked ? 'opacity:0.55' : ''}">
      <div class="item-check ${item.checked ? 'checked' : ''}" onclick="toggleCheck(${item.id})">${item.checked ? '✓' : ''}</div>
      <div>
        <div class="item-name" style="${item.checked ? 'text-decoration:line-through' : ''}">
          ${item.name}
          ${item.qty && item.qty > 1 ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-left:6px">×${item.qty}</span>` : ''}
          ${item.custom ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(200,240,96,0.1);color:var(--accent);margin-left:6px">CUSTOM</span>` : ''}
          ${item.link ? `<a href="${item.link}" target="_blank" style="margin-left:6px;font-size:11px;color:var(--muted);text-decoration:none" title="View product link">🔗</a>` : ''}
        </div>
        <div class="item-desc">${item.desc || ''}</div>
        ${item.maintenance ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--warn);margin-top:2px">🔄 ${item.maintenance}</div>` : ''}
        <div class="source-tag">▸ ${item.source}</div>
      </div>
      <div class="td">
        <span class="category-pill cat-${item.category}">${CAT_LABELS[item.category]?.split(' ')[0]}</span>
      </div>
      <div class="td">
        <span class="priority-dot" style="background:${pcolor}"></span>${item.priority}
      </div>
      <div class="td">
        <div>${item.volume ? item.volume + 'L' : '—'}</div>
        ${item.volume ? `<div class="vol-bar" style="margin-top:4px"><div class="vol-bar-fill" style="width:${volFill}%"></div></div>` : ''}
      </div>
      <div class="td">
        ${es ? `<span class="status-badge ${statusClass}">${expiryLabel}</span>` : '—'}
      </div>
      <div class="td" style="font-size:10px;color:var(--muted)">${item.source}</div>
      <div class="row-actions">
        <button class="icon-btn" title="Delete" onclick="deleteItem(${item.id})">🗑</button>
      </div>
    </div>
  `;
}

// ─── MOBILE ──────────────────────────────────────────────────────────────────
let mobileView = 'all';
let currentMobileTab = 'items';

function isMobile() {
  // Check multiple signals — Android Chrome can be unreliable with just innerWidth
  const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const narrowScreen = window.innerWidth <= 900;
  const mobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  return hasTouch || narrowScreen || mobileUA;
}

function applyMobileClass() {
  if (isMobile()) {
    document.body.classList.add('mobile');
  } else {
    document.body.classList.remove('mobile');
  }
}

// Apply immediately before anything renders
applyMobileClass();

function mobileNav(tab) {
  currentMobileTab = tab;
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`mnav-${tab}`);
  if (btn) btn.classList.add('active');

  if (tab === 'bags') { openMobileDrawer('bags'); return; }
  if (tab === 'alerts') { openMobileDrawer('alerts'); return; }
  if (tab === 'settings') { openMobileDrawer('settings'); return; }
  renderMobile();
}

function setMobileView(v) {
  mobileView = v;
  currentMobileTab = 'items';
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mnav-items').classList.add('active');
  renderMobile();
}

function openMobileDrawer(name) {
  renderMobileDrawer(name);
  document.getElementById(`${name}-drawer-overlay`).classList.add('open');
  setTimeout(() => document.getElementById(`${name}-drawer`).classList.add('open'), 10);
}

function closeMobileDrawer(name) {
  document.getElementById(`${name}-drawer`).classList.remove('open');
  document.getElementById(`${name}-drawer-overlay`).classList.remove('open');
  // Reset nav highlight back to items
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mnav-items').classList.add('active');
}

function renderMobileDrawer(name) {
  if (name === 'bags') {
    const el = document.getElementById('mobile-bags-list');
    if (!bags.length) {
      el.innerHTML = '<div style="padding:16px 16px 0;color:var(--muted);font-size:13px">No bags registered yet.</div>';
      return;
    }
    el.innerHTML = bags.map(b => `
      <div class="mobile-bag-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="mobile-bag-name">${b.name}</div>
          <button class="mobile-card-delete" onclick="deleteBag(${b.id});renderMobileDrawer('bags')">✕</button>
        </div>
        <div class="mobile-bag-vol">
          ${b.liters}L${b.litersExpanded ? ` <span style="color:var(--accent)">▸ ${b.litersExpanded}L expanded</span>` : ''}
          ${b.dims ? ` · ${b.dims}` : ''}
        </div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:8px">Assigned to:</div>
        <select class="form-select" style="font-size:12px" onchange="reassignBag(${b.id},this.value);renderMobileDrawer('bags')">
          ${Object.entries(SCENARIO_LABELS).map(([k,v]) =>
            `<option value="${k}" ${b.scenario===k?'selected':''}>${SCENARIO_ICONS[k]} ${v}</option>`
          ).join('')}
        </select>
        ${b.notes ? `<div style="font-size:11px;color:var(--muted);margin-top:8px">${b.notes}</div>` : ''}
      </div>
    `).join('');
  }

  if (name === 'alerts') {
    const el = document.getElementById('mobile-alerts-list');
    const expired = items.filter(i => expiryStatus(i.expiry) === 'expired');
    const expiring = items.filter(i => expiryStatus(i.expiry) === 'warn');
    if (!expired.length && !expiring.length) {
      el.innerHTML = '<div style="padding-top:8px;color:var(--good);font-size:14px;font-weight:600">✓ All clear — nothing needs rotation right now.</div>';
      return;
    }
    const renderAlertItem = (item, type) => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border)">
        <div style="font-weight:600;font-size:13px;margin-bottom:3px">${item.name}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="status-badge ${type === 'expired' ? 'status-expired' : 'status-warn'}">
            ${type === 'expired' ? 'EXPIRED' : `${daysUntilExpiry(item.expiry)}d left`}
          </span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">${SCENARIO_LABELS[item.scenario]}</span>
        </div>
      </div>`;
    el.innerHTML =
      (expired.length ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--danger);text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px">Expired</div>` + expired.map(i => renderAlertItem(i,'expired')).join('') : '') +
      (expiring.length ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warn);text-transform:uppercase;letter-spacing:1px;padding:12px 0 4px">Expiring Soon</div>` + expiring.map(i => renderAlertItem(i,'warn')).join('') : '');
  }
}

function getMobileItems() {
  let list = items.filter(i => i.scenario === currentScenario);
  if (mobileView === 'missing') list = list.filter(i => !i.checked);
  if (mobileView === 'expiring') list = items.filter(i => expiryStatus(i.expiry) === 'warn');
  if (mobileView === 'expired') list = items.filter(i => expiryStatus(i.expiry) === 'expired');
  return list;
}

function renderMobile() {
  const mc = document.getElementById('mobile-content');
  if (!mc) return;

  // Force mobile chrome visible via inline styles — bypasses any CSS class issues
  mc.style.display = 'block';
  const bottomNav = document.querySelector('.mobile-bottom-nav');
  if (bottomNav) bottomNav.style.display = 'flex';
  const scenarioStrip = document.getElementById('mobile-scenario-strip');
  if (scenarioStrip) scenarioStrip.style.display = 'flex';
  const fab = document.querySelector('.mobile-fab');
  if (fab) { fab.style.display = 'flex'; fab.style.alignItems = 'center'; fab.style.justifyContent = 'center'; }

  // Scenario chips
  const chips = document.getElementById('mobile-scenario-chips');
  if (chips) {
    chips.innerHTML = Object.entries(SCENARIO_LABELS).map(([k,v]) => `
      <button class="mobile-scenario-chip ${currentScenario===k?'active':''}" onclick="setScenario('${k}');renderMobile()">
        ${SCENARIO_ICONS[k]} ${v}
      </button>
    `).join('');
  }

  // Update alerts badge
  const alertCount = items.filter(i => expiryStatus(i.expiry) === 'expired' || expiryStatus(i.expiry) === 'warn').length;
  const alertIcon = document.getElementById('mnav-alerts-icon');
  if (alertIcon) alertIcon.textContent = alertCount > 0 ? '⚠️' : '✅';

  const list = getMobileItems();
  const allScenarioItems = items.filter(i => i.scenario === currentScenario);
  const packed = allScenarioItems.filter(i => i.checked).length;
  const total = allScenarioItems.length;
  const pct = total ? Math.round(packed/total*100) : 0;
  const totalVol = totalVolume(allScenarioItems);
  const assignedBag = bags.find(b => b.scenario === currentScenario);
  const bagCap = assignedBag ? assignedBag.liters : null;
  const expiredCount = items.filter(i => expiryStatus(i.expiry) === 'expired').length;
  const expiringCount = items.filter(i => expiryStatus(i.expiry) === 'warn').length;

  // Mobile content area
  const mc = document.getElementById('mobile-content');

  // Stats
  const statsHtml = `
    <div class="mobile-stats" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 16px">
      <div class="mobile-stat">
        <div class="mobile-stat-val" style="color:var(--accent)">${pct}%</div>
        <div class="mobile-stat-label">Packed</div>
        <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div></div>
      </div>
      <div class="mobile-stat">
        <div class="mobile-stat-val">${packed}/${total}</div>
        <div class="mobile-stat-label">Items Checked</div>
      </div>
      <div class="mobile-stat">
        <div class="mobile-stat-val" style="color:${bagCap&&totalVol>bagCap?'var(--danger)':'var(--text)'}">${totalVol.toFixed(1)}L</div>
        <div class="mobile-stat-label">Volume${bagCap?` / ${bagCap}L`:''}</div>
        ${bagCap?`<div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${Math.min(100,Math.round(totalVol/bagCap*100))}%;background:${totalVol>bagCap?'var(--danger)':'var(--good)'}"></div></div>`:''}
      </div>
      <div class="mobile-stat">
        <div class="mobile-stat-val" style="color:${expiredCount?'var(--danger)':expiringCount?'var(--warn)':'var(--good)'}">${expiredCount+expiringCount}</div>
        <div class="mobile-stat-label">Need Rotation</div>
      </div>
    </div>`;

  // View label
  const viewLabels = { all:'All Items', missing:'Unpacked', expiring:'Expiring Soon', expired:'Expired' };
  const viewLabel = mobileView !== 'all' ? `
    <div style="margin:0 0 8px;padding:8px 12px;background:rgba(200,240,96,0.08);border:1px solid rgba(200,240,96,0.2);border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);display:flex;align-items:center;justify-content:space-between">
      <span>VIEW: ${viewLabels[mobileView]?.toUpperCase()}</span>
      <button onclick="setMobileView('all')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">✕</button>
    </div>` : '';

  // Group by category
  const categories = [...new Set(list.map(i => i.category))];

  const itemsHtml = categories.length === 0 ? `
    <div class="empty-state" style="padding:40px 0">
      <div class="empty-icon">📦</div>
      <div class="empty-title">No items here</div>
      <div style="margin-bottom:20px;font-size:13px">Tap ＋ to add a custom item.</div>
      <button class="btn btn-primary" onclick="openAddItem('${currentScenario}')">＋ Add Custom Item</button>
    </div>` :
    categories.map(cat => {
      const catItems = list.filter(i => i.category === cat);
      const catPacked = catItems.filter(i => i.checked).length;
      return `
        <div class="mobile-category-header">
          <div class="mobile-category-title">${CAT_LABELS[cat]}</div>
          <div class="mobile-category-count">${catPacked}/${catItems.length}</div>
        </div>
        ${catItems.map(item => renderMobileCard(item)).join('')}
        <button onclick="openAddItemInCategory('${currentScenario}','${cat}')"
          style="width:100%;background:none;border:1px dashed var(--border);border-radius:8px;padding:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;margin-bottom:8px;-webkit-tap-highlight-color:transparent">
          ＋ Add ${CAT_LABELS[cat]?.replace(/^\S+\s/,'').toLowerCase()} item
        </button>`;
    }).join('');

  mc.innerHTML = statsHtml + '<div style="padding-top:8px">' + viewLabel + itemsHtml + '</div>';
}

function renderMobileCard(item) {
  const es = expiryStatus(item.expiry);
  const d = daysUntilExpiry(item.expiry);
  const pcolor = PRIORITY_COLORS[item.priority] || 'var(--muted)';
  let expiryBadge = '';
  if (es === 'expired') expiryBadge = `<span class="mobile-pill status-expired">EXPIRED</span>`;
  else if (es === 'warn') expiryBadge = `<span class="mobile-pill status-warn">${d}d left</span>`;

  return `
    <div class="mobile-item-card ${item.checked?'checked':''}" onclick="toggleCheck(${item.id});renderMobile()">
      <div class="mobile-card-top">
        <div class="mobile-card-check ${item.checked?'checked':''}">${item.checked?'✓':''}</div>
        <div class="mobile-card-body">
          <div class="mobile-card-name ${item.checked?'checked':''}">
            ${item.name}
            ${item.qty&&item.qty>1?`<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)"> ×${item.qty}</span>`:''}
            ${item.custom?`<span style="font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(200,240,96,0.1);color:var(--accent);margin-left:4px">CUSTOM</span>`:''}
          </div>
          ${item.desc?`<div class="mobile-card-desc">${item.desc}</div>`:''}
          <div class="mobile-card-meta">
            <span class="mobile-pill cat-${item.category}">${CAT_LABELS[item.category]?.split(' ')[0]}</span>
            <span class="mobile-pill" style="background:rgba(0,0,0,0.2)"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${pcolor};margin-right:4px;vertical-align:middle"></span>${item.priority}</span>
            ${item.volume?`<span class="mobile-pill" style="background:rgba(0,0,0,0.2);color:var(--muted)">${item.volume}L</span>`:''}
            ${expiryBadge}
            ${item.link?`<a href="${item.link}" target="_blank" onclick="event.stopPropagation()" style="font-size:13px;text-decoration:none">🔗</a>`:''}
          </div>
          ${item.maintenance?`<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warn);margin-top:5px">🔄 ${item.maintenance}</div>`:''}
        </div>
        <button class="mobile-card-delete" onclick="event.stopPropagation();deleteItem(${item.id});renderMobile()">🗑</button>
      </div>
    </div>`;
}

// Override render to also trigger mobile render
const _origRender = render;
function render() {
  updateSidebarCounts();
  renderBagList();
  renderMain();
  renderMobile();
}

window.addEventListener('resize', () => { applyMobileClass(); renderMobile(); });

// ─── INIT ────────────────────────────────────────────────────────────────────
applyMobileClass();
render();
</script>
</body>
</html>
