<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>READY — Preparedness Gear Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #161a18;
    --surface2: #1e2421;
    --border: #2a3030;
    --accent: #c8f060;
    --accent2: #ff6b35;
    --warn: #ffb347;
    --danger: #ff4444;
    --text: #e8ede8;
    --muted: #7a8c82;
    --good: #4ecb71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 24px;
  }

  .sidebar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 0 20px 8px;
    text-transform: uppercase;
  }

  .scenario-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }

  .scenario-btn:hover { background: var(--surface2); }
  .scenario-btn.active {
    background: var(--surface2);
    border-left-color: var(--accent);
    color: var(--accent);
  }

  .scenario-icon { font-size: 18px; flex-shrink: 0; }

  .scenario-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .scenario-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .bag-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 20px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    transition: color 0.15s;
  }

  .bag-btn:hover { color: var(--text); }

  .add-bag-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: calc(100% - 40px);
    margin: 8px 20px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .add-bag-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN */
  main {
    padding: 28px;
    overflow-y: auto;
  }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 20px;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  .page-subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* BAG PROFILE CARD */
  .bag-profile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }

  .bag-profile-info { display: flex; gap: 24px; align-items: center; }

  .bag-volume-gauge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 80px;
  }

  .gauge-ring {
    position: relative;
    width: 72px;
    height: 72px;
  }

  .gauge-ring svg { transform: rotate(-90deg); }

  .gauge-ring .track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 6;
  }

  .gauge-ring .fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }

  .gauge-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
  }

  .gauge-pct { font-size: 15px; font-weight: 600; }

  .bag-details { display: flex; flex-direction: column; gap: 4px; }
  .bag-name { font-size: 16px; font-weight: 600; }
  .bag-spec { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  .btn {
    padding: 8px 16px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0f0e;
  }
  .btn-primary:hover { background: #b8e050; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); color: #0d0f0e; border-color: var(--accent); font-weight: 600; }

  .search-box {
    margin-left: auto;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* ITEM TABLE */
  .item-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-head {
    display: grid;
    grid-template-columns: 28px 1fr 90px 80px 80px 90px 90px 60px;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
  }

  .item-row {
    display: grid;
    grid-template-columns: 28px 1fr 90px 80px 80px 90px 90px 60px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.1s;
    cursor: pointer;
  }

  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface2); }

  .item-check {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 2px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .item-check.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f0e;
    font-size: 10px;
  }

  .item-name { font-weight: 500; font-size: 13px; }
  .item-desc { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .category-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
  }

  .td { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .status-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
  }

  .status-ok { background: rgba(78,203,113,0.15); color: var(--good); }
  .status-warn { background: rgba(255,179,71,0.15); color: var(--warn); }
  .status-expired { background: rgba(255,68,68,0.15); color: var(--danger); }
  .status-missing { background: rgba(122,140,130,0.12); color: var(--muted); }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* CATEGORY COLORS */
  .cat-water { background: rgba(100,180,255,0.15); color: #64b4ff; }
  .cat-food { background: rgba(255,179,71,0.15); color: var(--warn); }
  .cat-shelter { background: rgba(78,203,113,0.15); color: var(--good); }
  .cat-medical { background: rgba(255,100,100,0.15); color: #ff6464; }
  .cat-comms { background: rgba(200,240,96,0.15); color: var(--accent); }
  .cat-tools { background: rgba(180,140,255,0.15); color: #b48cff; }
  .cat-docs { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .cat-power { background: rgba(255,220,100,0.15); color: #ffdc64; }
  .cat-hygiene { background: rgba(150,220,200,0.15); color: #96dcc8; }
  .cat-nav { background: rgba(200,160,100,0.15); color: #c8a064; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    color: var(--accent);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* SECTION GROUP */
  .section-group { margin-bottom: 32px; }

  .section-group-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-group-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
  }

  .section-progress {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* EXPIRY ALERT */
  .alert-banner {
    background: rgba(255,179,71,0.08);
    border: 1px solid rgba(255,179,71,0.3);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .alert-icon { font-size: 18px; }
  .alert-text { font-size: 12px; color: var(--warn); }
  .alert-text strong { display: block; margin-bottom: 2px; font-size: 13px; }

  /* VOLUME TAG */
  .vol-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    font-size: 14px;
    transition: color 0.15s;
    border-radius: 3px;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  /* TOOLTIP */
  .source-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    opacity: 0.7;
    margin-top: 2px;
  }

  /* VOLUME BAR INLINE */
  .vol-bar {
    width: 48px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .vol-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    opacity: 0.7;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .table-head, .item-row {
      grid-template-columns: 28px 1fr 80px 70px 70px;
    }
    .th:nth-child(6), .th:nth-child(7), .th:nth-child(8),
    .td:nth-child(6), .td:nth-child(7) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">⬡ READY</div>
    <div class="logo-tag">PREPAREDNESS GEAR TRACKER</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="openModal('bag-modal')">＋ Add Bag</button>
    <button class="btn btn-primary btn-sm" onclick="openModal('item-modal')">＋ Add Item</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Scenarios</div>
      <button class="scenario-btn active" onclick="setScenario('72hr')">
        <span class="scenario-icon">🎒</span>
        <span class="scenario-meta">
          <span>72-Hour Evacuation</span>
          <span class="scenario-count" id="count-72hr">0 items</span>
        </span>
      </button>
      <button class="scenario-btn" onclick="setScenario('ghb')">
        <span class="scenario-icon">🚶</span>
        <span class="scenario-meta">
          <span>Get-Home Bag</span>
          <span class="scenario-count" id="count-ghb">0 items</span>
        </span>
      </button>
      <button class="scenario-btn" onclick="setScenario('sip')">
        <span class="scenario-icon">🏠</span>
        <span class="scenario-meta">
          <span>Shelter-in-Place</span>
          <span class="scenario-count" id="count-sip">0 items</span>
        </span>
      </button>
      <button class="scenario-btn" onclick="setScenario('vehicle')">
        <span class="scenario-icon">🚗</span>
        <span class="scenario-meta">
          <span>Vehicle Kit</span>
          <span class="scenario-count" id="count-vehicle">0 items</span>
        </span>
      </button>
      <button class="scenario-btn" onclick="setScenario('wildfire')">
        <span class="scenario-icon">🔥</span>
        <span class="scenario-meta">
          <span>Wildfire Evac</span>
          <span class="scenario-count" id="count-wildfire">0 items</span>
        </span>
      </button>
      <button class="scenario-btn" onclick="setScenario('earthquake')">
        <span class="scenario-icon">⚡</span>
        <span class="scenario-meta">
          <span>Earthquake / CERT</span>
          <span class="scenario-count" id="count-earthquake">0 items</span>
        </span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">My Bags</div>
      <div id="bag-list"></div>
      <button class="add-bag-btn" onclick="openModal('bag-modal')">＋ REGISTER BAG</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">View</div>
      <button class="bag-btn" onclick="setView('all')">All Items</button>
      <button class="bag-btn" onclick="setView('missing')">Missing / Unchecked</button>
      <button class="bag-btn" onclick="setView('expiring')">Expiring Soon</button>
      <button class="bag-btn" onclick="setView('expired')">Expired</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="main-content">
    <!-- rendered by JS -->
  </main>
</div>

<!-- BAG MODAL -->
<div class="modal-overlay" id="bag-modal">
  <div class="modal">
    <div class="modal-title">Register a Bag</div>
    <div class="form-group">
      <label class="form-label">Bag Name / Label</label>
      <input class="form-input" id="bag-name" placeholder="e.g. Red MOLLE 40L, Gray Osprey...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Volume (Liters)</label>
        <input class="form-input" id="bag-liters" type="number" placeholder="e.g. 40">
      </div>
      <div class="form-group">
        <label class="form-label">Assigned Scenario</label>
        <select class="form-select" id="bag-scenario">
          <option value="72hr">72-Hour Evacuation</option>
          <option value="ghb">Get-Home Bag</option>
          <option value="sip">Shelter-in-Place</option>
          <option value="vehicle">Vehicle Kit</option>
          <option value="wildfire">Wildfire Evac</option>
          <option value="earthquake">Earthquake / CERT</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Dimensions (optional — W × H × D in cm or inches)</label>
      <input class="form-input" id="bag-dims" placeholder="e.g. 30cm × 50cm × 20cm">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input class="form-input" id="bag-notes" placeholder="Color, brand, special features...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('bag-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBag()">Register Bag</button>
    </div>
  </div>
</div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <div class="modal-title">Add Item</div>
    <div class="form-group">
      <label class="form-label">Item Name</label>
      <input class="form-input" id="item-name" placeholder="e.g. Water purification tablets">
    </div>
    <div class="form-group">
      <label class="form-label">Description / Notes</label>
      <input class="form-input" id="item-desc" placeholder="Brand, model, quantity, spec...">
    </div>
    <div class="form-row">
      <div class="form-group">

let bags = [];

function nextDate(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function daysUntilExpiry(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / 86400000);
}

function expiryStatus(dateStr) {
  const d = daysUntilExpiry(dateStr);
  if (d === null) return null;
  if (d < 0) return 'expired';
  if (d <= 90) return 'warn';
  return 'ok';
}

function scenarioItems(scenario) {
  return items.filter(i => i.scenario === scenario);
}

function totalVolume(itemList) {
  return itemList.reduce((s, i) => s + (parseFloat(i.volume) || 0), 0);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ─── SCENARIO / VIEW ─────────────────────────────────────────────────────────
function setScenario(s) {
  currentScenario = s;
  currentFilter = 'all';
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  render();
}

function setView(v) {
  currentView = v;
  currentFilter = 'all';
  render();
}

function setFilter(f) {
  currentFilter = f;
  render();
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
function saveBag() {
  const name = document.getElementById('bag-name').value.trim();
  const liters = parseFloat(document.getElementById('bag-liters').value) || 0;
  const scenario = document.getElementById('bag-scenario').value;
  const dims = document.getElementById('bag-dims').value.trim();
  const notes = document.getElementById('bag-notes').value.trim();
  if (!name) { alert('Enter a bag name.'); return; }
  bags.push({ id: Date.now(), name, liters, scenario, dims, notes });
  document.getElementById('bag-name').value = '';
  document.getElementById('bag-liters').value = '';
  document.getElementById('bag-dims').value = '';
  document.getElementById('bag-notes').value = '';
  closeModal('bag-modal');
  render();
}

function saveItem() {
  const name = document.getElementById('item-name').value.trim();
  if (!name) { alert('Enter item name.'); return; }
  const item = {
    id: nextId++,
    name,
    desc: document.getElementById('item-desc').value.trim(),
    category: document.getElementById('item-category').value,
    priority: document.getElementById('item-priority').value,
    scenario: document.getElementById('item-scenario').value,
    volume: parseFloat(document.getElementById('item-volume').value) || 0,
    weight: document.getElementById('item-weight').value.trim(),
    expiry: document.getElementById('item-expiry').value || null,
    source: document.getElementById('item-source').value,
    checked: false,
  };
  items.push(item);
  document.getElementById('item-name').value = '';
  document.getElementById('item-desc').value = '';
  closeModal('item-modal');
  render();
}

function toggleCheck(id) {
  const item = items.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  render();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  updateSidebarCounts();
  renderBagList();
  renderMain();
}

function updateSidebarCounts() {
  Object.keys(SCENARIO_LABELS).forEach(s => {
    const el = document.getElementById(`count-${s}`);
    if (el) {
      const list = scenarioItems(s);
      el.textContent = `${list.filter(i => i.checked).length}/${list.length} packed`;
    }
  });
}

function renderBagList() {
  const el = document.getElementById('bag-list');
  if (!bags.length) { el.innerHTML = ''; return; }
  el.innerHTML = bags.map(b => `
    <div class="bag-btn" style="display:flex;align-items:center;padding:8px 20px;gap:8px;">
      <span style="flex:1;font-size:12px;color:var(--text)">${b.name}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">${b.liters}L</span>
    </div>
  `).join('');
}

function getFilteredItems() {
  let list;
  if (currentView === 'expiring') {
    list = items.filter(i => { const s = expiryStatus(i.expiry); return s === 'warn'; });
  } else if (currentView === 'expired') {
    list = items.filter(i => expiryStatus(i.expiry) === 'expired');
  } else if (currentView === 'missing') {
    list = items.filter(i => i.scenario === currentScenario && !i.checked);
  } else {
    list = items.filter(i => i.scenario === currentScenario);
  }

  if (currentFilter !== 'all') list = list.filter(i => i.category === currentFilter);
  if (searchQuery) list = list.filter(i =>
    i.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
    (i.desc || '').toLowerCase().includes(searchQuery.toLowerCase())
  );
  return list;
}

function renderMain() {
  const main = document.getElementById('main-content');
  const scenarioList = scenarioItems(currentScenario);
  const filteredList = getFilteredItems();

  const packed = scenarioList.filter(i => i.checked).length;
  const total = scenarioList.length;
  const pct = total ? Math.round(packed / total * 100) : 0;
  const usedVol = totalVolume(scenarioList.filter(i => i.checked));
  const totalVol = totalVolume(scenarioList);
  const expiringSoon = items.filter(i => expiryStatus(i.expiry) === 'warn').length;
  const expired = items.filter(i => expiryStatus(i.expiry) === 'expired').length;

  // Assigned bag
  const assignedBag = bags.find(b => b.scenario === currentScenario);
  const bagCapacity = assignedBag ? assignedBag.liters : null;
  const volPct = bagCapacity ? Math.min(100, Math.round(usedVol / bagCapacity * 100)) : null;
  const gaugeColor = volPct > 90 ? 'var(--danger)' : volPct > 70 ? 'var(--warn)' : 'var(--accent)';

  const circumference = 2 * Math.PI * 30;
  const offset = circumference - (volPct || 0) / 100 * circumference;

  // Group by category
  const categories = [...new Set(filteredList.map(i => i.category))];

  main.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${SCENARIO_ICONS[currentScenario]} ${SCENARIO_LABELS[currentScenario] || 'All Items'}</div>
        <div class="page-subtitle">
          ${currentView !== 'all' ? `VIEW: ${currentView.toUpperCase()} — ` : ''}
          ${filteredList.length} items${bagCapacity ? ` · Bag: ${assignedBag.name} (${bagCapacity}L)` : ' · No bag assigned'}
        </div>
      </div>
    </div>

    ${(expiringSoon || expired) ? `
    <div class="alert-banner">
      <div class="alert-icon">⚠️</div>
      <div class="alert-text">
        <strong>Maintenance Required</strong>
        ${expired ? `${expired} item(s) <span style="color:var(--danger)">expired</span>` : ''}
        ${expiringSoon ? `${expiringSoon} item(s) expiring within 90 days` : ''}
        — check the Expiring / Expired views.
      </div>
    </div>` : ''}

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" style="color:var(--accent)">${pct}%</div>
        <div class="stat-label">Packed Complete</div>
        <div class="progress-bar" style="margin-top:8px">
          <div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${packed}/${total}</div>
        <div class="stat-label">Items Checked</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:${volPct > 90 ? 'var(--danger)' : 'var(--text)'}">
          ${totalVol.toFixed(1)}L
        </div>
        <div class="stat-label">Total Item Volume${bagCapacity ? ` / ${bagCapacity}L cap` : ''}</div>
        ${bagCapacity ? `<div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${Math.min(100,Math.round(totalVol/bagCapacity*100))}%;background:${totalVol/bagCapacity>1?'var(--danger)':'var(--good)'}"></div></div>` : ''}
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:${expired?'var(--danger)':expiringSoon?'var(--warn)':'var(--good)'}">
          ${expired + expiringSoon}
        </div>
        <div class="stat-label">Need Rotation</div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      ${['water','food','shelter','medical','comms','tools','docs','power','hygiene','nav'].map(c =>
        `<button class="filter-chip ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${CAT_LABELS[c]}</button>`
      ).join('')}
      <input class="search-box" placeholder="🔍 Search items..." oninput="searchQuery=this.value;renderMain()" value="${searchQuery}">
    </div>

    ${filteredList.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <div class="empty-title">No items here</div>
        <div>Add items using the + Add Item button, or adjust your filters.</div>
      </div>
    ` : categories.map(cat => {
      const catItems = filteredList.filter(i => i.category === cat);
      const catPacked = catItems.filter(i => i.checked).length;
      return `
        <div class="section-group">
          <div class="section-group-title">
            <div class="section-group-name">${CAT_LABELS[cat]}</div>
            <div class="section-progress">${catPacked}/${catItems.length} packed</div>
          </div>
          <div class="item-table">
            <div class="table-head">
              <div class="th"></div>
              <div class="th">Item</div>
              <div class="th">Category</div>
              <div class="th">Priority</div>
              <div class="th">Volume</div>
              <div class="th">Expiry</div>
              <div class="th">Source</div>
              <div class="th"></div>
            </div>
            ${catItems.map(item => renderItemRow(item)).join('')}
          </div>
        </div>
      `;
    }).join('')}
  `;
}

function renderItemRow(item) {
  const es = expiryStatus(item.expiry);
  const d = daysUntilExpiry(item.expiry);
  let expiryLabel = '—';
  let statusClass = '';
  if (item.expiry) {
    if (es === 'expired') { expiryLabel = `Exp ${d < -365 ? '>1yr ago' : Math.abs(d)+'d ago'}`; statusClass = 'status-expired'; }
    else if (es === 'warn') { expiryLabel = `${d}d`; statusClass = 'status-warn'; }
    else { const dt = new Date(item.expiry); expiryLabel = dt.toLocaleDateString('en-US',{month:'short',year:'numeric'}); statusClass = 'status-ok'; }
  }
  const pcolor = PRIORITY_COLORS[item.priority] || 'var(--muted)';
  const volMax = 5;
  const volFill = Math.min(100, (item.volume / volMax) * 100);

  return `
    <div class="item-row" style="${item.checked ? 'opacity:0.55' : ''}">
      <div class="item-check ${item.checked ? 'checked' : ''}" onclick="toggleCheck(${item.id})">${item.checked ? '✓' : ''}</div>
      <div>
        <div class="item-name" style="${item.checked ? 'text-decoration:line-through' : ''}">${item.name}</div>
        <div class="item-desc">${item.desc || ''}</div>
        <div class="source-tag">▸ ${item.source}</div>
      </div>
      <div class="td">
        <span class="category-pill cat-${item.category}">${CAT_LABELS[item.category]?.split(' ')[0]}</span>
      </div>
      <div class="td">
        <span class="priority-dot" style="background:${pcolor}"></span>${item.priority}
      </div>
      <div class="td">
        <div>${item.volume ? item.volume + 'L' : '—'}</div>
        ${item.volume ? `<div class="vol-bar" style="margin-top:4px"><div class="vol-bar-fill" style="width:${volFill}%"></div></div>` : ''}
      </div>
      <div class="td">
        ${es ? `<span class="status-badge ${statusClass}">${expiryLabel}</span>` : '—'}
      </div>
      <div class="td" style="font-size:10px;color:var(--muted)">${item.source}</div>
      <div class="row-actions">
        <button class="icon-btn" title="Delete" onclick="deleteItem(${item.id})">🗑</button>
      </div>
    </div>
  `;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
